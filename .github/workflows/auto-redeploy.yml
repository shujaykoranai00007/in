name: Auto Redeploy Render and Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret is missing"
            exit 1
          fi

          echo "Triggering Render deploy..."
          curl --fail --show-error --silent --request POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deploy trigger sent"

      - name: Trigger Vercel deploy hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL secret is missing"
            exit 1
          fi

          echo "Triggering Vercel deploy..."
          curl --fail --show-error --silent --request POST "$VERCEL_DEPLOY_HOOK_URL"
          echo "Vercel deploy trigger sent"
