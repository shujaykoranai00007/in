services:
  mongodb:
    image: mongo:7
    container_name: insta-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: insta-backend
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend

  frontend:
    image: node:20-alpine
    container_name: insta-frontend
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    volumes:
      - ./frontend:/app/frontend

volumes:
  mongo_data:
